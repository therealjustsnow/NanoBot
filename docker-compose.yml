services:
  nanobot:
    build: .
    restart: unless-stopped
    volumes:
      # config.ini must exist on the host — copy example_config.ini to get started.
      # Mounted read-write so `!config set` and `!setloglevel` can persist changes.
      - ./config.ini:/app/config.ini
      # Persistent SQLite DB and logs
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      # Optional: set DISCORD_TOKEN here instead of in config.ini
      - DISCORD_TOKEN=${DISCORD_TOKEN:-}
