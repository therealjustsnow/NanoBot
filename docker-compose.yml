services:
  nanobot:
    build: .
    restart: unless-stopped
    volumes:
      # config.json must exist on the host — copy example_config.json to get started
      - ./config.json:/app/config.json:ro
      # Persistent SQLite DB and logs
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      # Optional: set DISCORD_TOKEN here instead of in config.json
      - DISCORD_TOKEN=${DISCORD_TOKEN:-}
