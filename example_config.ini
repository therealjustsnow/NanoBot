; NanoBot configuration.
; Copy this file to config.ini and fill in at least `token`.
; Keys left blank (or missing) fall back to their built-in default.
;
; Edit with any text editor, or from Discord via DM:
;   !config show                     -- list every key (secrets are masked)
;   !config get <section>.<key>      -- read one value
;   !config set <section>.<key> <v>  -- write one value
;   !reloadconfig                    -- reload without restarting the bot

[bot]
; Bot token from the Discord Developer Portal.
token = YOUR_BOT_TOKEN_HERE

; Default command prefix (max 5 chars, no spaces).
default_prefix = n!

; Discord user ID of the bot owner. Leave blank to use the application owner.
owner_id =

[logging]
; DEBUG / INFO / WARNING / ERROR / CRITICAL
log_level = INFO

; true = log every raw HTTP request (very noisy).
log_http = false

[votes]
; top.gg AUTH token.
topgg_token =

; top.gg v1 API token used for commands sync.
topgg_v1_token =

; discordbotlist.com bot token.
dbl_token =

; discord.bots.gg bot token.
discordbotsgg_token =

; Local port the vote webhook listens on.
vote_webhook_port = 5000

; Shared secret used by bot lists to authenticate webhooks.
vote_webhook_secret =

[groq]
; Groq API key (free at console.groq.com). Powers /eli5 and WYR generation.
; The GROQ_API_KEY environment variable takes priority if set.
groq_api_key =

[scraper]
; FML pages fetched per daily scrape (~5-10 stories each).
fml_pages_per_scrape = 500

; Would-You-Rather API requests per rating per daily scrape.
wyr_requests_per_scrape = 500

; nekos.best images fetched per endpoint per daily scrape.
nekos_per_endpoint = 400

; Nekosia images fetched per tag per daily scrape.
nekosia_per_tag = 400

; Age (seconds) before a cached URL is rechecked with HEAD. 604800 = 7 days.
revalidate_age = 604800

; Max URLs to HEAD-check per 6-hour revalidation cycle.
revalidate_batch = 1000

; System prompt used when Groq generates fresh WYR questions daily.
groq_wyr_system = You generate Would You Rather questions for a Discord bot. Return ONLY a JSON array of strings. Each string must start with "Would you rather" and contain exactly two options separated by " or ". End each with a question mark. Make them fun, creative, and varied -- mix silly, deep, gross, impossible, and everyday scenarios. No numbered lists, no markdown, no explanation. Just the JSON array.
